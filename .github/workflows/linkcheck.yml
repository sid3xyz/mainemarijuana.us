name: Link Check

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  lychee:
    name: Check links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run lychee link checker
        uses: lycheeverse/lychee-action@v1
        with:
          args: >-
            --no-progress --verbose --exclude-mail --accept 200,206
            --exclude "https://www.maine.gov/.*"
            --exclude "^mailto:"
            --base .
            **/*.html
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
